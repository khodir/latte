version: '3.8'

networks:
  latte:
    driver: bridge

volumes:
  db-data:
  valkey-data:
  minio-data:

services:
  app:
    image: registry.gitlab.com/khodir94/latte:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    expose:
      - 80
    depends_on:
      - db
      - valkey
      - minio
    environment:
      RAILS_ENV: ${RAILS_ENV}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_URL: trilogy://${MARIADB_USER}:${MARIADB_PASSWORD}@db/${MARIADB_DATABASE}
      REDIS_URL: redis://default:gXC3n9sMwtvTZq1kRB2wH8UvA4JbL5@valkey:6379
      OTEL_SDK_DISABLED: true
      PROMETHEUS_ENABLED: "false"
      OPENTELEMETRY_ENABLED: "false"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_ENDPOINT: http://minio:9000
      AWS_FORCE_PATH_STYLE: true
      AWS_BUCKET: latte

  db:
    image: docker.io/library/mariadb:11.8.2
    restart: always
    expose:
      - 3306
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - latte

  valkey:
    image: docker.io/valkey/valkey:8.1.3
    restart: always
    expose:
      - 6379
    command: ["valkey-server", "--save 60 1", '--requirepass "gXC3n9sMwtvTZq1kRB2wH8UvA4JbL5"']
    volumes:
      - valkey-data:/data
    networks:
      - latte

  minio:
    image: quay.io/minio/minio:RELEASE.2025-05-24T17-08-30Z
    restart: always
    expose:
      - 9000
      - 9001
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - latte
    
    